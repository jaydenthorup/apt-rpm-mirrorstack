<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Public Mirror</title>
  <style>
    body {
      margin: 24px;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
      background: #fff;
      line-height: 1.45;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 600;
    }

    .meta {
      color: #555;
      margin-bottom: 16px;
    }

    .warning {
      max-width: 760px;
      border: 1px solid #d8b100;
      background: #fff9db;
      color: #4a3b00;
      padding: 10px 12px;
      margin: 0 0 16px;
      font-size: 14px;
    }

    .warning strong {
      display: inline-block;
      margin-right: 6px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 760px;
    }

    th,
    td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
    }

    th {
      font-weight: 600;
      background: #f7f7f7;
    }

    a {
      color: #0645ad;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 14px;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>Public Mirror Index</h1>
  <div class="meta">Simple package mirror landing page.</div>

  <table>
    <thead>
      <tr>
        <th>Path</th>
        <th>Description</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><a href="/ubuntu/">ubuntu/</a></td>
        <td>Ubuntu package repository tree</td>
      </tr>
      <tr>
        <td><a href="/proxmox/">proxmox/</a></td>
        <td>Proxmox VE package repository tree</td>
      </tr>
      <tr>
        <td><a href="/alma/">alma/</a></td>
        <td>AlmaLinux repository tree</td>
      </tr>
      <tr>
        <td><a href="/arch/">arch/</a></td>
        <td>Arch Linux repository tree</td>
      </tr>
    </tbody>
  </table>

  <div class="footer"></div>
</body>
</html>
